<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>대관 신청 | 하하캠퍼스</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body data-depth="1">
    <a href="#main" class="skip-link">본문 바로가기</a>
    <div id="site-header"></div>
    <div id="breadcrumb"></div>
    <main id="main" class="container section">
      <h1 class="page-heading">대관 신청</h1>
      <p class="page-lead">폼 제출 시 실제 저장 없이 접수 완료 페이지로 이동합니다.</p>
      <form id="rental-apply-form" class="card" style="margin-top: 1rem">
        <div class="form-grid">
          <label>
            신청자명
            <input type="text" name="name" required />
          </label>
          <label>
            연락처
            <input type="tel" name="phone" required />
          </label>
          <label>
            시설 코드(slug)
            <input id="rental-facility" type="text" name="facility" placeholder="예: pickleball-tennis" required />
          </label>
          <label>
            이용 희망일
            <input type="date" name="date" required />
          </label>
        </div>
        <label>
          상세 요청사항
          <textarea name="memo" placeholder="[PLACEHOLDER]"></textarea>
        </label>
        <p class="help">개인정보/결제 정보는 저장되지 않는 시제품 폼입니다.</p>
        <button type="submit" class="button">접수하기(가짜)</button>
      </form>
    </main>
    <div id="site-footer"></div>
    <script src="../assets/js/data.js"></script>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
