<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수강 신청 | 하하캠퍼스</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body data-depth="1">
    <a href="#main" class="skip-link">본문 바로가기</a>
    <div id="site-header"></div>
    <div id="breadcrumb"></div>
    <main id="main" class="container section">
      <h1 class="page-heading">수강 신청</h1>
      <p class="page-lead">신청 정보는 저장되지 않으며 제출 시 완료 화면으로 이동합니다.</p>
      <form id="program-apply-form" class="card" style="margin-top: 1rem">
        <div class="form-grid">
          <label>
            신청자명
            <input type="text" name="name" required />
          </label>
          <label>
            연락처
            <input type="tel" name="phone" required />
          </label>
          <label>
            프로그램 ID
            <input id="program-id" type="text" name="programId" placeholder="예: 001" required />
          </label>
          <label>
            연령대
            <select name="ageGroup" required>
              <option value="">선택</option>
              <option>50대 [PLACEHOLDER]</option>
              <option>60대 [PLACEHOLDER]</option>
              <option>70대 이상 [PLACEHOLDER]</option>
            </select>
          </label>
        </div>
        <label>
          요청사항
          <textarea name="memo" placeholder="[PLACEHOLDER]"></textarea>
        </label>
        <p class="help">시제품 범위: 실제 회원가입/결제/정원관리 없음.</p>
        <button type="submit" class="button">수강 신청(가짜)</button>
      </form>
    </main>
    <div id="site-footer"></div>
    <script src="../assets/js/data.js"></script>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
